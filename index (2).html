/* ============================== UTILIDADES DE COLOR ============================== */
function hex2rgb(hex) {
  const h = hex.replace("#", "");
  const v = parseInt(h, 16);
  return [(v >> 16) & 255, (v >> 8) & 255, v & 255];
}
function rgb2hex(rgb) {
  return "#" + rgb.map((x) => Math.max(0, Math.min(255, Math.round(x))).toString(16).padStart(2, "0")).join("");
}
function lerpColor(c1, c2, t) {
  const r1 = hex2rgb(c1), r2 = hex2rgb(c2);
  return rgb2hex(r1.map((v, i) => v + (r2[i] - v) * t));
}
function tasaColor(v) {
  const stops = [
    { p: 18, c: "#B6432E" },
    { p: 38, c: "#C99A3C" },
    { p: 60, c: "#3F6B52" },
  ];
  if (v <= stops[0].p) return stops[0].c;
  if (v >= stops[stops.length - 1].p) return stops[stops.length - 1].c;
  for (let i = 0; i < stops.length - 1; i++) {
    if (v >= stops[i].p && v <= stops[i + 1].p) {
      const t = (v - stops[i].p) / (stops[i + 1].p - stops[i].p);
      return lerpColor(stops[i].c, stops[i + 1].c, t);
    }
  }
  return stops[stops.length - 1].c;
}

function Pill({ children, tone }) {

}

function KpiCard({ label, value, suffix, delta, baseline, isBaseline, format }) {
  let tone = "neu";
  if (!isBaseline) {
    if (delta > 0.4) tone = "pos";
    else if (delta < -0.4) tone = "neg";
  }
  return (
    <div className="ticket kpi-card">
      <div className="perf-row">
        {Array.from({ length: 7 }).map((_, i) => (
          <span key={i} className="perf-dot" />
        ))}
      </div>
      <div className="kpi-label">{label}</div>
      <div className="kpi-value">
        {value}
        <span className="kpi-suffix">{suffix}</span>
      </div>
      <div className={"kpi-delta tone-" + tone}>
        <span className="dot" />
        {isBaseline
          ? "Base general (todos)"
          : (delta > 0 ? "+" : "") + format(delta) + suffix + " vs. base general"}
      </div>
    </div>
  );
}

function BarChartTier({ data }) {
  const w = 600, h = 230, padL = 40, padB = 34, padT = 10;
  const max = 70;
  const bw = (w - padL - 20) / TIER_ORDER.length;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="chart-svg">
      {[0, 20, 40, 60].map((g) => (
        <g key={g}>
          <line x1={padL} x2={w - 10} y1={h - padB - (g / max) * (h - padB - padT)} y2={h - padB - (g / max) * (h - padB - padT)} stroke="#E3DAC4" strokeWidth="1" />
          <text x={padL - 8} y={h - padB - (g / max) * (h - padB - padT) + 4} textAnchor="end" className="axis-label">{g}%</text>
        </g>
      ))}
      {TIER_ORDER.map((tier, i) => {
        const d = data.by_tier[tier];
        if (!d) return null;
        const barH = (d.tasa / max) * (h - padB - padT);
        const x = padL + i * bw + bw * 0.18;
        const bw2 = bw * 0.64;
        const y = h - padB - barH;
        return (
          <g key={tier}>
            <rect x={x} y={y} width={bw2} height={barH} rx="6" fill={tasaColor(d.tasa)} />
            <text x={x + bw2 / 2} y={y - 8} textAnchor="middle" className="bar-value">{d.tasa}%</text>
            <text x={x + bw2 / 2} y={h - padB + 18} textAnchor="middle" className="axis-label">{tier}</text>
            <text x={x + bw2 / 2} y={h - padB + 32} textAnchor="middle" className="axis-sublabel">n={d.count}</text>
          </g>
        );
      })}
    </svg>
  );
}

function TrendChart({ data }) {
  const w = 600, h = 230, padL = 40, padB = 34, padT = 16, padR = 16;
  const max = 70;
  const pts = data.by_meses;
  const innerW = w - padL - padR;
  const stepX = innerW / (pts.length - 1);
  const coords = pts.map((p, i) => ({
    x: padL + i * stepX,
    y: h - padB - (p.tasa / max) * (h - padB - padT),
    ...p,
  }));
  const line = coords.map((c) => `${c.x},${c.y}`).join(" ");
  const area = `${padL},${h - padB} ` + line + ` ${padL + innerW},${h - padB}`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="chart-svg">
      {[0, 20, 40, 60].map((g) => (
        <g key={g}>
          <line x1={padL} x2={w - padR} y1={h - padB - (g / max) * (h - padB - padT)} y2={h - padB - (g / max) * (h - padB - padT)} stroke="#E3DAC4" strokeWidth="1" />
          <text x={padL - 8} y={h - padB - (g / max) * (h - padB - padT) + 4} textAnchor="end" className="axis-label">{g}%</text>
        </g>
      ))}
      <polygon points={area} fill="#C99A3C22" />
      <polyline points={line} fill="none" stroke="#C99A3C" strokeWidth="3" strokeLinejoin="round" strokeLinecap="round" />
      {coords.map((c, i) => (
        <g key={i}>
          <circle cx={c.x} cy={c.y} r="5.5" fill={tasaColor(c.tasa)} stroke="#FFFDF8" strokeWidth="2" />
          <text x={c.x} y={c.y - 14} textAnchor="middle" className="bar-value">{c.tasa}%</text>
          <text x={c.x} y={h - padB + 18} textAnchor="middle" className="axis-label">{MESES_LABELS[c.bucket]}</text>
        </g>
      ))}
    </svg>
  );
}

function FeatureImportanceChart({ data }) {
  const w = 600, h = 300, padL = 190, padR = 50, padT = 10, padB = 10;
  const max = Math.max(...data.map((d) => d.importance)) * 1.15;
  const rowH = (h - padT - padB) / data.length;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="chart-svg">
      {data.map((d, i) => {
        const barW = ((w - padL - padR) * d.importance) / max;
        const y = padT + i * rowH + rowH * 0.22;
        const bh = rowH * 0.56;
        return (
          <g key={d.feature}>
            <text x={padL - 10} y={y + bh / 2 + 4} textAnchor="end" className="axis-label">{FEATURE_LABELS[d.feature] || d.feature}</text>
            <rect x={padL} y={y} width={barW} height={bh} rx="5" fill={i < 2 ? "#BB4430" : i < 5 ? "#C99A3C" : "#2D5F7C"} />
            <text x={padL + barW + 8} y={y + bh / 2 + 4} className="bar-value">{d.importance}%</text>
          </g>
        );
      })}
    </svg>
  );
}

function ConfusionMatrix({ cm, testSize }) {
  const [[tn, fp], [fn, tp]] = cm;
  return (
    <div className="cm-wrap">
      <div className="cm-grid">
        <div className="cm-cell cm-tn"><span className="cm-n">{tn}</span><span className="cm-l">No leal → No leal (correcto)</span></div>
        <div className="cm-cell cm-fp"><span className="cm-n">{fp}</span><span className="cm-l">No leal → Leal (error)</span></div>
        <div className="cm-cell cm-fn"><span className="cm-n">{fn}</span><span className="cm-l">Leal → No leal (riesgo no detectado)</span></div>
        <div className="cm-cell cm-tp"><span className="cm-n">{tp}</span><span className="cm-l">Leal → Leal (correcto)</span></div>
      </div>
      <p className="cm-note">Sobre {testSize} clientes de prueba (Random Forest). El modelo detecta correctamente a {tp + tn} de {testSize} casos.</p>
    </div>
  );
}

function ScenarioChart() {
  const months = [0, 3, 6, 9, 12];
  const malo = [39.1, 38.6, 38.1, 37.8, 37.6];
  const prom = [39.1, 40.8, 42.1, 43.1, 43.8];
  const w = 600, h = 240, padL = 40, padR = 16, padT = 16, padB = 30;
  const max = 48, min = 34;
  const innerW = w - padL - padR;
  const stepX = innerW / (months.length - 1);
  const toY = (v) => h - padB - ((v - min) / (max - min)) * (h - padB - padT);
  const lineOf = (arr) => arr.map((v, i) => `${padL + i * stepX},${toY(v)}`).join(" ");
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="chart-svg">
      {[34, 38, 42, 46].map((g) => (
        <g key={g}>
          <line x1={padL} x2={w - padR} y1={toY(g)} y2={toY(g)} stroke="#E3DAC4" strokeWidth="1" />
          <text x={padL - 8} y={toY(g) + 4} textAnchor="end" className="axis-label">{g}%</text>
        </g>
      ))}
      <polyline points={lineOf(malo)} fill="none" stroke="#BB4430" strokeWidth="3" strokeDasharray="6 5" strokeLinecap="round" />
      <polyline points={lineOf(prom)} fill="none" stroke="#3F6B52" strokeWidth="3" strokeLinecap="round" />
      {months.map((mo, i) => (
        <text key={mo} x={padL + i * stepX} y={h - padB + 18} textAnchor="middle" className="axis-label">{mo === 0 ? "Hoy" : `+${mo}m`}</text>
      ))}
      <circle cx={padL + 4 * stepX} cy={toY(37.6)} r="5" fill="#BB4430" />
      <text x={padL + 4 * stepX} y={toY(37.6) - 12} textAnchor="middle" className="bar-value" fill="#BB4430">37.6%</text>
      <circle cx={padL + 4 * stepX} cy={toY(43.8)} r="5" fill="#3F6B52" />
      <text x={padL + 4 * stepX} y={toY(43.8) - 12} textAnchor="middle" className="bar-value" fill="#3F6B52">43.8%</text>
    </svg>
  );
}

        .tone-border-blue { border-left-color: var(--blue); }
        .tone-border-blue .eyebrow { color: var(--blue); }
        .tone-border-red { border-left-color: var(--red); }
        .tone-border-red .eyebrow { color: var(--red); }
        .tone-border-green { border-left-color: var(--green); }
        .tone-border-green .eyebrow { color: var(--green); }

        .smart-quote { font-size: 17px; font-weight: 600; line-height: 1.5; font-style: italic; background: var(--gold-soft); border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; }
        .kpi-table-wrap { overflow-x: auto; }
        .kpi-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
        .kpi-table th { text-align: left; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; padding: 8px 12px; border-bottom: 2px solid var(--border); }
        .kpi-table td { padding: 12px 12px; border-bottom: 1px solid var(--border); }
        .meta-pos { color: var(--green); font-weight: 700; }

        @media (max-width: 880px) {
          .kpi-grid { grid-template-columns: 1fr 1fr; }
          .viz-grid-2, .model-grid, .scenario-cards { grid-template-columns: 1fr; }
          .map-layout { grid-template-columns: 1fr; }
        }
      `}</style>

      <div className="header">
        <div>
          <Eyebrow>DASHBOARD EJECUTIVO · DIRECCIÓN DE MARKETING</Eyebrow>
          <div className="header-title">Lealtad de clientes — cadena de calzado</div>
          <div className="header-sub">Programa de fidelización · 1,000 clientes · narrativa S → C → R</div>
        </div>
      </div>
      <Stitch />

      <div className="tabs">
        <Tag id="01" label="Situación" active={tab === "situacion"} onClick={() => setTab("situacion")} />
        <Tag id="02" label="Predictivo" active={tab === "predictivo"} onClick={() => setTab("predictivo")} />
        <Tag id="03" label="Narrativa" active={tab === "narrativa"} onClick={() => setTab("narrativa")} />
      </div>

      {tab === "situacion" && <TabSituacion />}
      {tab === "predictivo" && <TabPredictivo />}
      {tab === "narrativa" && <TabNarrativa />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
